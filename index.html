<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Chinki 💖</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    /* ───────── CSS Variables & Reset ───────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:    #f7a8c4;
      --blush:   #fddde6;
      --peach:   #fce4d6;
      --lavender:#e8d5f5;
      --cream:   #fff9f5;
      --gold:    #f9d976;
      --deep:    #c2698f;
      --text:    #5a3a4a;
      --soft:    #b07a9e;
    }

    html {
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      font-family: 'Lato', sans-serif;
      background: linear-gradient(135deg, #fddde6 0%, #fce4d6 40%, #e8d5f5 100%);
      display: flex; align-items: flex-start; justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative; cursor: none;
    }

    /* ───────── Custom Cursor ───────── */
    #cursor {
      width: 18px; height: 18px;
      background: var(--deep);
      border-radius: 50%;
      position: fixed; pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease;
      mix-blend-mode: multiply;
    }

    /* ───────── Background Bubbles ───────── */
    .bg-blob {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.35;
      animation: float-blob 12s ease-in-out infinite alternate;
      pointer-events: none; z-index: 0;
    }
    .bg-blob.b1 { width:400px; height:400px; background:var(--rose);   top:-80px;  left:-80px;  animation-duration:14s; }
    .bg-blob.b2 { width:300px; height:300px; background:var(--lavender);bottom:-60px; right:-60px; animation-duration:10s; animation-delay:-5s; }
    .bg-blob.b3 { width:250px; height:250px; background:var(--gold);   top:40%;    left:55%;    animation-duration:16s; animation-delay:-3s; }

    @keyframes float-blob {
      from { transform: scale(1) translate(0,0); }
      to   { transform: scale(1.15) translate(20px, 30px); }
    }

    /* ───────── Floating Background Hearts ───────── */
    .bg-heart {
      position: fixed; pointer-events: none; z-index: 1;
      font-size: 1.4rem; opacity: 0;
      animation: float-up 8s ease-in infinite;
    }
    @keyframes float-up {
      0%   { transform: translateY(110vh) scale(0.5) rotate(-15deg); opacity: 0; }
      10%  { opacity: 0.5; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) scale(1.2) rotate(15deg); opacity: 0; }
    }

    /* ───────── Main Stage ───────── */
    #stage {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      width: 100%; min-height: 100vh; padding: 40px 20px;
    }

    /* ───────── Envelope ───────── */
    #envelope-wrap {
      position: relative;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    #envelope-wrap:hover { transform: scale(1.04) rotate(-1deg); }
    #envelope-wrap:hover .env-label { letter-spacing: 3px; }

    .envelope {
      width: 260px; height: 180px;
      position: relative;
    }
    /* Envelope body */
    .env-body {
      width: 100%; height: 100%;
      background: linear-gradient(160deg, #fde8ef, #fbc8dc);
      border-radius: 8px 8px 16px 16px;
      box-shadow: 0 12px 40px rgba(194,105,143,0.35), 0 2px 8px rgba(194,105,143,0.2);
      position: absolute; top: 0; left: 0; overflow: hidden;
    }
    /* Envelope bottom triangle */
    .env-bottom {
      position: absolute; bottom: 0; left: 0;
      width: 0; height: 0;
      border-left: 130px solid #f5b8cf;
      border-right: 130px solid #f5b8cf;
      border-top: 90px solid transparent;
    }
    /* Envelope left flap */
    .env-left {
      position: absolute; top: 0; left: 0;
      width: 0; height: 0;
      border-top: 90px solid #f9d0e2;
      border-right: 130px solid transparent;
    }
    /* Envelope right flap */
    .env-right {
      position: absolute; top: 0; right: 0;
      width: 0; height: 0;
      border-top: 90px solid #f7c5dc;
      border-left: 130px solid transparent;
    }
    /* Envelope top flap (animates open) */
    .env-top {
      position: absolute; top: 0; left: 0;
      width: 0; height: 0;
      border-top: 90px solid #eea8c5;
      border-left: 130px solid transparent;
      border-right: 130px solid transparent;
      transform-origin: top center;
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 5;
    }
    .env-top.open { transform: rotateX(180deg); }

    /* Wax seal */
    .wax-seal {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 52px; height: 52px;
      background: radial-gradient(circle at 35% 35%, #f7a8c4, var(--deep));
      border-radius: 50%;
      box-shadow: 0 3px 12px rgba(194,105,143,0.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; z-index: 6;
      animation: pulse-seal 2s ease-in-out infinite;
      transition: opacity 0.4s ease;
    }
    @keyframes pulse-seal {
      0%, 100% { box-shadow: 0 3px 12px rgba(194,105,143,0.5), 0 0 0 0 rgba(247,168,196,0.6); }
      50%       { box-shadow: 0 3px 12px rgba(194,105,143,0.5), 0 0 0 12px rgba(247,168,196,0); }
    }

    .env-label {
      position: absolute; bottom: -38px; left: 50%;
      transform: translateX(-50%);
      font-family: 'Dancing Script', cursive;
      font-size: 1.05rem; color: var(--deep);
      white-space: nowrap;
      transition: letter-spacing 0.3s ease;
      letter-spacing: 1px;
    }

    /* ───────── Card (hidden initially) ───────── */
    #card-container {
      width: 100%;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0; z-index: 20;
      padding: 20px;
      transition: opacity 0.4s ease;
    }
    #card-container.visible {
      pointer-events: all; opacity: 1;
    }

    #card {
      background: linear-gradient(160deg, #fff9f5 0%, #fde8ef 60%, #f0dff7 100%);
      border-radius: 24px;
      padding: 44px 40px 36px;
      max-width: 520px; width: 100%;
      box-shadow:
        0 30px 80px rgba(194,105,143,0.3),
        0 8px 24px rgba(194,105,143,0.15),
        inset 0 1px 0 rgba(255,255,255,0.9);
      position: relative; overflow: hidden;
      transform: scale(0.3) translateY(60px); opacity: 0;
      transition: transform 0.9s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.6s ease;
    }
    #card.open {
      transform: scale(1) translateY(0); opacity: 1;
    }

    /* Card decorative corner roses */
    .card-rose {
      position: absolute; font-size: 2rem; opacity: 0.18;
      animation: spin-slow 20s linear infinite;
    }
    .card-rose.tl { top: 12px; left: 14px; }
    .card-rose.tr { top: 12px; right: 14px; animation-direction: reverse; }
    .card-rose.bl { bottom: 12px; left: 14px; animation-direction: reverse; }
    .card-rose.br { bottom: 12px; right: 14px; }
    @keyframes spin-slow { to { transform: rotate(360deg); } }

    /* Shimmer stripe across card */
    .card-shimmer {
      position: absolute; top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
      animation: shimmer 4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes shimmer { 0%,100%{left:-100%} 50%{left:130%} }

    /* Card header */
    .card-header {
      text-align: center; margin-bottom: 28px;
    }
    .card-header .emoji-row {
      font-size: 2rem; letter-spacing: 6px; margin-bottom: 10px;
      animation: bounce-emojis 2s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes bounce-emojis {
      0%,100%{ transform: translateY(0); }
      50%    { transform: translateY(-6px); }
    }
    .card-header h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 2.8rem; font-weight: 700;
      background: linear-gradient(135deg, var(--deep), #9b59b6, var(--rose));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2; margin-bottom: 4px;
    }
    .card-header .subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic; color: var(--soft);
      font-size: 0.95rem; letter-spacing: 1px;
    }

    /* Divider */
    .divider {
      width: 80px; height: 2px; margin: 0 auto 24px;
      background: linear-gradient(90deg, transparent, var(--rose), transparent);
      border-radius: 2px;
    }

    /* Message text */
    #message-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem; line-height: 1.85;
      color: var(--text);
      text-align: center;
      min-height: 80px;
      white-space: pre-wrap;
    }
    #message-text .cursor-blink {
      display: inline-block; width: 2px; height: 1.1em;
      background: var(--deep); vertical-align: text-bottom;
      animation: blink 0.75s step-end infinite; margin-left: 1px;
    }
    @keyframes blink { 50%{ opacity:0; } }

    /* Buttons */
    .btn-row {
      display: flex; gap: 14px; justify-content: center;
      margin-top: 28px; flex-wrap: wrap;
    }
    .btn {
      border: none; border-radius: 50px; padding: 12px 28px;
      font-family: 'Dancing Script', cursive; font-size: 1.1rem;
      cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative; overflow: hidden;
    }
    .btn::after {
      content:''; position:absolute; top:50%; left:50%;
      width:0; height:0;
      background: rgba(255,255,255,0.4);
      border-radius:50%;
      transform: translate(-50%,-50%);
      transition: width 0.4s ease, height 0.4s ease, opacity 0.4s ease;
      opacity: 0;
    }
    .btn:active::after { width:200px; height:200px; opacity:1; }
    .btn:hover { transform: translateY(-3px); }

    .btn-open {
      background: linear-gradient(135deg, var(--deep), #9b59b6);
      color: #fff;
      box-shadow: 0 6px 20px rgba(194,105,143,0.45);
    }
    .btn-open:hover { box-shadow: 0 10px 30px rgba(194,105,143,0.6); }

    .btn-love {
      background: linear-gradient(135deg, #f7a8c4, #fddde6);
      color: var(--deep);
      box-shadow: 0 6px 20px rgba(247,168,196,0.45);
      border: 1.5px solid rgba(194,105,143,0.25);
    }
    .btn-love:hover { box-shadow: 0 10px 30px rgba(247,168,196,0.6); }

    .btn-music {
      background: linear-gradient(135deg, #e8d5f5, #d5b3f0);
      color: #7b4fa6;
      box-shadow: 0 6px 20px rgba(213,179,240,0.4);
      padding: 10px 22px;
      font-size: 1rem;
    }

    /* ───────── Music toggle (top right) ───────── */
    #music-btn {
      position: fixed; top: 20px; right: 20px; z-index: 100;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
      border: 1.5px solid rgba(194,105,143,0.3);
      border-radius: 50px; padding: 8px 18px;
      font-family: 'Lato', sans-serif; font-size: 0.85rem;
      color: var(--deep); cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(194,105,143,0.2);
    }
    #music-btn:hover { background: rgba(255,255,255,0.9); transform: scale(1.05); }
    #music-btn.playing { background: linear-gradient(135deg, #fde8ef, #e8d5f5); }

    /* ───────── Confetti canvas ───────── */
    #confetti-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 50;
    }

    /* ───────── Floating cursor hearts ───────── */
    .cursor-heart {
      position: fixed; pointer-events: none; z-index: 200;
      font-size: 1.2rem; opacity: 1;
      animation: cursor-heart-anim 1s ease-out forwards;
    }
    @keyframes cursor-heart-anim {
      0%   { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-80px) scale(0.3); opacity: 0; }
    }

    /* ───────── Heart explosion particles ───────── */
    .explosion-heart {
      position: fixed; pointer-events: none; z-index: 200;
      font-size: 1.5rem;
      animation: explode 1.2s ease-out forwards;
    }
    @keyframes explode {
      0%   { transform: translate(0,0) scale(0.5); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

    /* ───────── Responsive ───────── */
    @media (max-width: 540px) {
      #card { padding: 32px 22px 28px; }
      .card-header h1 { font-size: 2.2rem; }
      #message-text { font-size: 0.97rem; }
      .btn { padding: 10px 20px; font-size: 1rem; }
      .envelope { width: 220px; height: 152px; }
      .env-left,.env-top { border-top-width:76px; }
      .env-right         { border-top-width:76px; }
      .env-left          { border-right-width:110px; }
      .env-right         { border-left-width:110px; }
      .env-bottom        { border-left-width:110px; border-right-width:110px; border-top-width:76px; }
    }
  </style>
</head>
<body>

<!-- Custom cursor -->
<div id="cursor">💗</div>

<!-- Background blobs -->
<div class="bg-blob b1"></div>
<div class="bg-blob b2"></div>
<div class="bg-blob b3"></div>

<!-- Confetti canvas -->
<canvas id="confetti-canvas"></canvas>

<!-- Music toggle -->
<button id="music-btn">🎵 Music Off</button>

<!-- ─────────────── MAIN STAGE ─────────────── -->
<div id="stage">

  <!-- ENVELOPE (shown first) -->
  <div id="envelope-wrap" onclick="openEnvelope()">
    <div class="envelope" id="envelope">
      <div class="env-body"></div>
      <div class="env-bottom"></div>
      <div class="env-left"></div>
      <div class="env-right"></div>
      <div class="env-top" id="env-top"></div>
      <div class="wax-seal" id="wax-seal">💌</div>
    </div>
    <div class="env-label">Tap to open, Chinki 🌸</div>
  </div>

  <!-- CARD (revealed after envelope opens) -->
  <div id="card-container">
    <div id="card">
      <!-- Decorative corners -->
      <span class="card-rose tl">🌸</span>
      <span class="card-rose tr">🌸</span>
      <span class="card-rose bl">🌷</span>
      <span class="card-rose br">🌷</span>
      <!-- Shimmer effect -->
      <div class="card-shimmer"></div>

      <!-- Header -->
      <div class="card-header">
        <div class="emoji-row">🎂 🎁 🎈</div>
        <h1>Happy Birthday,<br>Chinki!</h1>
        <p class="subtitle">— a little letter for my little queen —</p>
      </div>
      <div class="divider"></div>

      <!-- Typewriter message -->
      <div id="message-text"><span id="typed"></span><span class="cursor-blink" id="type-cursor"></span></div>

      <!-- Buttons -->
      <div class="btn-row" id="btn-row" style="display:none">
        <button class="btn btn-love" onclick="sendLove()">Send Love ❤️</button>
        <button class="btn btn-music" onclick="toggleMusic()" id="music-btn-card">🎵 Music</button>
      </div>
    </div>
  </div>

</div><!-- /stage -->

<!-- Hidden audio element — uses a public-domain lullaby-style tone generated via Web Audio -->
<audio id="bg-music" loop></audio>

<script>
/* ════════════════════════════════════════════
   BIRTHDAY CARD — Chinki (Tasneem)
   ════════════════════════════════════════════ */

// ── Message ──────────────────────────────────
const MESSAGE =
`Happy Birthday, Chinku Baby ❤️

If life is a long story, then meeting you is my favorite chapter. I'm really glad I get to write the rest of it with you.

Out of all the people in this huge world, I somehow ended up with the one who feels like home.

I don't know what the future holds, but I know I want you in it. 🤍

Happy Birthday, my Batuk Babygirl. 🌸`;

// ── State ────────────────────────────────────
let cardOpened = false;
let musicOn    = false;
let audioCtx   = null;
let gainNode   = null;
let musicNodes = [];

// ── Custom cursor ────────────────────────────
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

// ── Spawn background floating hearts ─────────
const hearts = ['💕','💗','💖','🌸','✨','💫','🌷'];
function spawnBgHearts() {
  for (let i = 0; i < 14; i++) {
    const el = document.createElement('div');
    el.className = 'bg-heart';
    el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    el.style.left  = Math.random() * 100 + 'vw';
    el.style.fontSize = (0.9 + Math.random() * 1.2) + 'rem';
    el.style.animationDelay    = (Math.random() * 8) + 's';
    el.style.animationDuration = (6 + Math.random() * 6) + 's';
    document.body.appendChild(el);
  }
}
spawnBgHearts();

// ── Mouse-move cursor hearts ─────────────────
let lastHeart = 0;
document.addEventListener('mousemove', e => {
  if (Date.now() - lastHeart < 120) return;
  lastHeart = Date.now();
  const el = document.createElement('div');
  el.className = 'cursor-heart';
  el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
  el.style.left = e.clientX + 'px';
  el.style.top  = e.clientY + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
});

// ── Open Envelope ────────────────────────────
function openEnvelope() {
  if (cardOpened) return;
  cardOpened = true;

  // Flip top flap
  document.getElementById('env-top').classList.add('open');
  document.getElementById('wax-seal').style.opacity = '0';

  // Burst mini confetti
  burstConfetti(60, true);

  // After flap animation, slide card up
  setTimeout(() => {
    document.getElementById('envelope-wrap').style.transition = 'opacity 0.5s ease';
    document.getElementById('envelope-wrap').style.opacity = '0';
    setTimeout(() => {
      showCard();
    }, 500);
  }, 900);
}

// ── Show Card ────────────────────────────────
function showCard() {
  // Hide envelope, show card container in the flow
  document.getElementById('envelope-wrap').style.display = 'none';
  const container = document.getElementById('card-container');
  const card      = document.getElementById('card');
  container.classList.add('visible');
  // Trigger open animation on next frame
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      card.classList.add('open');
      // Scroll to top so card is visible
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });

  // Big confetti burst
  setTimeout(() => burstConfetti(140), 400);

  // Start typewriter after card settles
  setTimeout(startTypewriter, 1200);
}

// ── Typewriter Effect ────────────────────────
function startTypewriter() {
  const typed  = document.getElementById('typed');
  const cursor = document.getElementById('type-cursor');
  let i = 0;
  const speed = 28; // ms per character

  function type() {
    if (i < MESSAGE.length) {
      typed.textContent += MESSAGE[i];
      i++;
      // Scroll card into view as text grows
      typed.parentElement.scrollTop = typed.parentElement.scrollHeight;
      setTimeout(type, speed);
    } else {
      // Remove blinking cursor, show buttons
      cursor.remove();
      document.getElementById('btn-row').style.display = 'flex';
      // Final confetti celebration
      setTimeout(() => burstConfetti(200), 200);
    }
  }
  type();
}

// ── Confetti System ──────────────────────────
const canvas  = document.getElementById('confetti-canvas');
const ctx2d   = canvas.getContext('2d');
let pieces    = [];
let animFrame = null;

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const COLORS = ['#f7a8c4','#fddde6','#c2698f','#e8d5f5','#f9d976','#b07a9e','#ffffff','#fce4d6'];

function burstConfetti(count = 120, subtle = false) {
  const cx = window.innerWidth / 2;
  const cy = subtle ? window.innerHeight * 0.4 : window.innerHeight * 0.3;
  for (let i = 0; i < count; i++) {
    const angle   = (Math.random() * Math.PI * 2);
    const speed   = subtle ? (1 + Math.random() * 4) : (3 + Math.random() * 8);
    pieces.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - (subtle ? 2 : 5),
      size: 5 + Math.random() * 7,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 8,
      shape: Math.random() > 0.5 ? 'rect' : 'heart',
      alpha: 1,
      gravity: 0.18 + Math.random() * 0.1
    });
  }
  if (!animFrame) animateConfetti();
}

function animateConfetti() {
  ctx2d.clearRect(0, 0, canvas.width, canvas.height);
  pieces = pieces.filter(p => p.alpha > 0.01);
  if (pieces.length === 0) { animFrame = null; return; }

  pieces.forEach(p => {
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += p.gravity;
    p.vx *= 0.99;
    p.rotation += p.rotSpeed;
    if (p.y > canvas.height * 0.8) p.alpha -= 0.025;

    ctx2d.save();
    ctx2d.globalAlpha = p.alpha;
    ctx2d.translate(p.x, p.y);
    ctx2d.rotate(p.rotation * Math.PI / 180);
    ctx2d.fillStyle = p.color;

    if (p.shape === 'rect') {
      ctx2d.fillRect(-p.size / 2, -p.size / 3, p.size, p.size * 0.6);
    } else {
      // Mini heart
      const s = p.size * 0.45;
      ctx2d.beginPath();
      ctx2d.moveTo(0, s * 0.4);
      ctx2d.bezierCurveTo(-s * 0.1, -s * 0.1, -s, -s * 0.1, -s, s * 0.5);
      ctx2d.bezierCurveTo(-s, s * 1.2, 0, s * 1.6, 0, s * 1.6);
      ctx2d.bezierCurveTo(0, s * 1.6, s, s * 1.2, s, s * 0.5);
      ctx2d.bezierCurveTo(s, -s * 0.1, s * 0.1, -s * 0.1, 0, s * 0.4);
      ctx2d.fill();
    }
    ctx2d.restore();
  });

  animFrame = requestAnimationFrame(animateConfetti);
}

// ── Heart Explosion (Send Love button) ───────
function sendLove() {
  const btn = document.querySelector('.btn-love');
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top  + rect.height / 2;

  const bigHearts = ['❤️','💖','💗','💕','💞','🌹','💝'];
  for (let i = 0; i < 28; i++) {
    const el  = document.createElement('div');
    el.className = 'explosion-heart';
    el.textContent = bigHearts[Math.floor(Math.random() * bigHearts.length)];
    el.style.left  = cx + 'px';
    el.style.top   = cy + 'px';
    el.style.fontSize = (1 + Math.random() * 1.8) + 'rem';
    const angle = (Math.random() * Math.PI * 2);
    const dist  = 80 + Math.random() * 200;
    el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    el.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    el.style.animationDelay = (Math.random() * 0.3) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1600);
  }

  burstConfetti(180);

  // Button wiggle
  btn.style.transition = 'transform 0.1s ease';
  btn.style.transform = 'scale(1.15)';
  setTimeout(() => btn.style.transform = '', 200);
}

// ── Web Audio API — generative music ─────────
/* Creates a soft, looping ambient pad using oscillators.
   No external file needed — works entirely in the browser. */
function createAmbientMusic() {
  if (audioCtx) return; // already created
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  gainNode = audioCtx.createGain();
  gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
  gainNode.connect(audioCtx.destination);

  // Soft pad: layered sine + triangle oscillators in a nice chord
  const notes = [261.63, 329.63, 392.00, 523.25, 440.00]; // C4 E4 G4 C5 A4
  notes.forEach((freq, i) => {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = i % 2 === 0 ? 'sine' : 'triangle';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    // Gentle vibrato
    const lfo  = audioCtx.createOscillator();
    const lfoG = audioCtx.createGain();
    lfo.frequency.value = 4 + i * 0.3;
    lfoG.gain.value = 1.5;
    lfo.connect(lfoG);
    lfoG.connect(osc.frequency);
    lfo.start();

    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
    osc.connect(gain);
    gain.connect(gainNode);
    osc.start();
    musicNodes.push(osc, lfo);
  });
}

function toggleMusic() {
  if (!audioCtx) createAmbientMusic();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  musicOn = !musicOn;
  gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
  gainNode.gain.linearRampToValueAtTime(
    musicOn ? 0.9 : 0,
    audioCtx.currentTime + 1.5
  );

  const label = musicOn ? '🎵 Music On' : '🎵 Music Off';
  document.getElementById('music-btn').textContent = label;
  document.getElementById('music-btn').className   = 'music-btn' + (musicOn ? ' playing' : '');
  if (document.getElementById('music-btn-card'))
    document.getElementById('music-btn-card').textContent = musicOn ? '🔇 Mute' : '🎵 Music';
}

// ── Top music button ──────────────────────────
document.getElementById('music-btn').addEventListener('click', toggleMusic);

// ── Sparkle trail on touch (mobile) ──────────
document.addEventListener('touchmove', e => {
  const t = e.touches[0];
  const el = document.createElement('div');
  el.className = 'cursor-heart';
  el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
  el.style.left = t.clientX + 'px';
  el.style.top  = t.clientY + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}, { passive: true });
</script>
